<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collection - CampusKudi</title>
    <link rel="stylesheet" href="./css/style.css">
    <style>
        .collection-wrapper {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .filters-sidebar {
            background: var(--light-color);
            padding: 1.5rem;
            border-radius: 8px;
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .filter-group {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .filter-group:last-child {
            border-bottom: none;
        }

        .filter-group h3 {
            font-size: 16px;
            margin-bottom: 1rem;
            color: var(--dark-color);
        }

        .filter-options {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .filter-option {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .filter-option input[type="radio"],
        .filter-option input[type="checkbox"] {
            cursor: pointer;
        }

        .filter-option label {
            cursor: pointer;
            flex: 1;
            display: flex;
            justify-content: space-between;
        }

        .filter-count {
            color: #999;
            font-size: 12px;
        }

        .search-bar {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .search-bar input {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }

        .search-bar button {
            padding: 0.75rem 1.5rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .sort-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .sort-bar select {
            padding: 0.5rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }

        @media (max-width: 768px) {
            .collection-wrapper {
                grid-template-columns: 1fr;
            }

            .filters-sidebar {
                position: static;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <nav class="navbar">
            <div class="logo">CampusKudi</div>
            
            <ul class="nav-menu">
                <li class="nav-item"><a href="/">Home</a></li>
                <li class="nav-item"><a href="/collection.html">Collection</a></li>
                <li class="nav-item"><a href="/cart.html">Cart</a></li>
            </ul>

            <div id="auth-buttons" class="auth-buttons">
                <a href="/login.html" class="btn-secondary">Login</a>
                <a href="/signup.html" class="btn-primary">Sign Up</a>
            </div>

            <div id="user-menu" class="user-menu">
                <a href="/account.html">
                    <span id="user-name">User</span>
                </a>
                <a href="/account.html" class="btn-secondary">Account</a>
                <button class="btn-secondary" onclick="logoutUser()">Logout</button>
            </div>
        </nav>
    </header>

    <!-- Collection Content -->
    <div class="collection-wrapper">
        <!-- Filters Sidebar -->
        <aside class="filters-sidebar">
            <h2 style="margin-bottom: 1.5rem;">Filters</h2>

            <!-- Search -->
            <div class="search-bar" style="margin-bottom: 1.5rem;">
                <input 
                    type="text" 
                    id="search-input" 
                    placeholder="Search products..."
                >
                <button onclick="searchProducts()">🔍</button>
            </div>

            <!-- Category Filter -->
            <div class="filter-group">
                <h3>Category</h3>
                <div class="filter-options" id="category-filters">
                    <div class="filter-option">
                        <label>
                            <input type="radio" name="category" value="" onchange="loadProducts({ category: this.value })">
                            All Products
                        </label>
                    </div>
                </div>
            </div>

            <!-- Price Filter -->
            <div class="filter-group">
                <h3>Price Range</h3>
                <div class="filter-options">
                    <div class="filter-option">
                        <label>
                            <input type="radio" name="price" onchange="loadProducts({ minPrice: 0, maxPrice: 500 })">
                            Under ₹500
                        </label>
                    </div>
                    <div class="filter-option">
                        <label>
                            <input type="radio" name="price" onchange="loadProducts({ minPrice: 500, maxPrice: 1000 })">
                            ₹500 - ₹1000
                        </label>
                    </div>
                    <div class="filter-option">
                        <label>
                            <input type="radio" name="price" onchange="loadProducts({ minPrice: 1000, maxPrice: 2000 })">
                            ₹1000 - ₹2000
                        </label>
                    </div>
                    <div class="filter-option">
                        <label>
                            <input type="radio" name="price" onchange="loadProducts({ minPrice: 2000 })">
                            Above ₹2000
                        </label>
                    </div>
                </div>
            </div>

            <!-- Rating Filter -->
            <div class="filter-group">
                <h3>Rating</h3>
                <div class="filter-options">
                    <div class="filter-option">
                        <label>
                            <input type="checkbox" onchange="applyFilters()">
                            ⭐⭐⭐⭐⭐ 5 Star
                        </label>
                    </div>
                    <div class="filter-option">
                        <label>
                            <input type="checkbox" onchange="applyFilters()">
                            ⭐⭐⭐⭐ 4+ Star
                        </label>
                    </div>
                    <div class="filter-option">
                        <label>
                            <input type="checkbox" onchange="applyFilters()">
                            ⭐⭐⭐ 3+ Star
                        </label>
                    </div>
                </div>
            </div>

            <button class="btn-secondary btn-block" onclick="loadProducts()" style="margin-top: 1.5rem;">
                Clear Filters
            </button>
        </aside>

        <!-- Products Section -->
        <main>
            <!-- Sort Bar -->
            <div class="sort-bar">
                <h2>Products</h2>
                <select onchange="loadProducts({ sort: this.value })">
                    <option value="">Default</option>
                    <option value="newest">Newest First</option>
                    <option value="price-asc">Price: Low to High</option>
                    <option value="price-desc">Price: High to Low</option>
                    <option value="rating">Top Rated</option>
                </select>
            </div>

            <!-- Products Grid -->
            <div id="products-grid" class="products-grid">
                <div style="text-align: center; grid-column: 1 / -1; padding: 3rem;">
                    <div class="loading"></div>
                    <p>Loading products...</p>
                </div>
            </div>

            <!-- Pagination -->
            <div id="pagination"></div>
        </main>
    </div>

    <!-- Footer -->
    <footer style="background: #333; color: white; padding: 3rem 2rem; text-align: center; margin-top: 3rem;">
        <p>&copy; 2024 CampusKudi. All rights reserved.</p>
    </footer>

    <!-- Scripts -->
    <script src="./js/api.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/products.js"></script>

    <script>
        // Load categories for filter
        async function loadCategories() {
            try {
                const response = await Categories.getAll();
                if (response.success) {
                    const categoryFilters = document.getElementById('category-filters');
                    response.data.forEach(category => {
                        const div = document.createElement('div');
                        div.className = 'filter-option';
                        div.innerHTML = `
                            <label>
                                <input type="radio" name="category" value="${category.slug}" 
                                    onchange="loadProducts({ category: this.value })">
                                ${category.name}
                            </label>
                        `;
                        categoryFilters.appendChild(div);
                    });
                }
            } catch (error) {
                console.error('Failed to load categories:', error);
            }
        }

        // Apply filters
        function applyFilters() {
            const category = document.querySelector('input[name="category"]:checked')?.value || '';
            const sort = document.querySelector('select')?.value || '';
            loadProducts({ category, sort });
        }

        // Store current filters
        window.currentFilters = {};

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadCategories();
            loadProducts();
        });
    </script>
</body>
</html>
