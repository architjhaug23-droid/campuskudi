<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - CampusKudi</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <!-- Header -->
    <header>
        <nav class="navbar">
            <a href="/" class="logo">CampusKudi</a>
        </nav>
    </header>

    <!-- Progress Bar -->
    <div style="background: #f5f5f5; padding: 1rem 0; text-align: center;">
        <div style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-around;">
            <div style="flex: 1; text-align: center;">
                <span style="display: inline-block; width: 40px; height: 40px; background: var(--primary-color); color: white; border-radius: 50%; line-height: 40px;">1</span>
                <p style="font-size: 12px; margin-top: 0.5rem;">Cart</p>
            </div>
            <div style="flex: 1; text-align: center;">
                <span style="display: inline-block; width: 40px; height: 40px; background: var(--primary-color); color: white; border-radius: 50%; line-height: 40px;">2</span>
                <p style="font-size: 12px; margin-top: 0.5rem;">Checkout</p>
            </div>
            <div style="flex: 1; text-align: center;">
                <span style="display: inline-block; width: 40px; height: 40px; background: #ddd; color: #999; border-radius: 50%; line-height: 40px;">3</span>
                <p style="font-size: 12px; margin-top: 0.5rem;">Confirmation</p>
            </div>
        </div>
    </div>

    <!-- Checkout Form -->
    <div id="checkout-container">
        <div style="text-align: center; padding: 4rem 2rem;">
            <div class="loading"></div>
            <p>Loading checkout...</p>
        </div>
    </div>

    <!-- Footer -->
    <footer style="background: #333; color: white; padding: 2rem; text-align: center; margin-top: 3rem;">
        <p>&copy; 2024 CampusKudi</p>
    </footer>

    <!-- Scripts -->
    <script src="./js/api.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/checkout.js"></script>
</body>
</html>
