<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account - CampusKudi</title>
    <link rel="stylesheet" href="./css/style.css">
    <style>
        .tab-content {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .profile-tab form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .security-section {
            background: var(--light-color);
            padding: 1.5rem;
            border-radius: 8px;
            margin-top: 2rem;
        }

        .security-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .security-item:last-child {
            border-bottom: none;
        }

        .order-card {
            background: var(--light-color);
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .order-status {
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .order-status.pending {
            background: #fff3e0;
            color: #ff8800;
        }

        .order-status.processing {
            background: #e3f2fd;
            color: #1976d2;
        }

        .order-status.shipped {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .order-status.delivered {
            background: #e8f5e9;
            color: #388e3c;
        }

        .order-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            font-size: 14px;
            color: #666;
        }

        .order-details p {
            margin-bottom: 0.25rem;
        }

        .order-actions {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }

        .wishlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
        }

        .wishlist-item {
            background: var(--light-color);
            border-radius: 8px;
            overflow: hidden;
            text-align: center;
            transition: all 0.3s;
        }

        .wishlist-item:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .wishlist-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .wishlist-item h4 {
            padding: 0.75rem;
            margin: 0;
            font-size: 14px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wishlist-item .price {
            padding: 0 0.75rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .wishlist-item .actions {
            padding: 0.75rem;
            display: flex;
            gap: 0.5rem;
        }

        .wishlist-item .actions button {
            flex: 1;
            padding: 0.5rem;
            font-size: 12px;
        }

        .address-item {
            background: var(--light-color);
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .address-item h3 {
            margin-bottom: 0.75rem;
        }

        .address-item p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <nav class="navbar">
            <a href="/" class="logo">CampusKudi</a>
            
            <ul class="nav-menu">
                <li class="nav-item"><a href="/">Home</a></li>
                <li class="nav-item"><a href="/collection.html">Collection</a></li>
                <li class="nav-item"><a href="/cart.html">Cart</a></li>
            </ul>

            <div id="auth-buttons" class="auth-buttons">
                <a href="/login.html" class="btn-secondary">Login</a>
                <a href="/signup.html" class="btn-primary">Sign Up</a>
            </div>

            <div id="user-menu" class="user-menu">
                <span id="user-name">User</span>
                <button class="btn-secondary" onclick="logoutUser()">Logout</button>
            </div>
        </nav>
    </header>

    <!-- Account Container -->
    <div id="account-container">
        <div style="text-align: center; padding: 4rem 2rem;">
            <div class="loading"></div>
            <p>Loading account...</p>
        </div>
    </div>

    <!-- Footer -->
    <footer style="background: #333; color: white; padding: 2rem; text-align: center; margin-top: 3rem;">
        <p>&copy; 2024 CampusKudi</p>
    </footer>

    <!-- Scripts -->
    <script src="./js/api.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/account.js"></script>
</body>
</html>
