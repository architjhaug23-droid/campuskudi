<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - CampusKudi</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <!-- Header -->
    <header>
        <nav class="navbar">
            <a href="/" class="logo">CampusKudi</a>
            
            <ul class="nav-menu">
                <li class="nav-item"><a href="/">Home</a></li>
                <li class="nav-item"><a href="/collection.html">Collection</a></li>
                <li class="nav-item"><a href="/cart.html">Cart</a></li>
            </ul>

            <div id="auth-buttons" class="auth-buttons">
                <a href="/login.html" class="btn-secondary">Login</a>
                <a href="/signup.html" class="btn-primary">Sign Up</a>
            </div>

            <div id="user-menu" class="user-menu">
                <a href="/account.html">
                    <span id="user-name">User</span>
                </a>
                <button class="btn-secondary" onclick="logoutUser()">Logout</button>
            </div>
        </nav>
    </header>

    <!-- Product Detail -->
    <div id="product-detail">
        <div style="text-align: center; padding: 4rem 2rem;">
            <div class="loading"></div>
            <p>Loading product details...</p>
        </div>
    </div>

    <!-- Reviews Section -->
    <div style="max-width: 1200px; margin: 3rem auto; padding: 0 2rem;">
        <div id="product-reviews">
            <h3>Customer Reviews</h3>
            <div style="text-align: center; padding: 2rem; color: #999;">
                <p>Loading reviews...</p>
            </div>
        </div>

        <!-- Add Review Form -->
        <div style="background: var(--light-color); padding: 2rem; border-radius: 8px; margin-top: 2rem;">
            <h3>Leave a Review</h3>
            
            <form id="review-form" style="display: none;" onsubmit="submitReview(event)">
                <div class="form-group">
                    <label>Rating</label>
                    <div style="display: flex; gap: 0.5rem;">
                        <button type="button" class="rating-btn" data-rating="1">⭐</button>
                        <button type="button" class="rating-btn" data-rating="2">⭐⭐</button>
                        <button type="button" class="rating-btn" data-rating="3">⭐⭐⭐</button>
                        <button type="button" class="rating-btn" data-rating="4">⭐⭐⭐⭐</button>
                        <button type="button" class="rating-btn" data-rating="5">⭐⭐⭐⭐⭐</button>
                    </div>
                    <input type="hidden" id="review-rating" name="rating" value="5" required>
                </div>

                <div class="form-group">
                    <label>Your Review</label>
                    <textarea 
                        name="comment" 
                        placeholder="Share your thoughts about this product..."
                        style="min-height: 120px; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 4px; font-family: inherit;"
                    ></textarea>
                </div>

                <button type="submit" class="btn-primary">Submit Review</button>
            </form>

            <div id="login-prompt" style="text-align: center;">
                <p>
                    <a href="/login.html" class="btn-secondary">Login to leave a review</a>
                </p>
            </div>
        </div>

        <script>
            // Show review form if logged in
            document.addEventListener('DOMContentLoaded', () => {
                const reviewForm = document.getElementById('review-form');
                const loginPrompt = document.getElementById('login-prompt');

                if (isLoggedIn()) {
                    reviewForm.style.display = 'block';
                    loginPrompt.style.display = 'none';

                    // Rating buttons
                    document.querySelectorAll('.rating-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.preventDefault();
                            const rating = btn.dataset.rating;
                            document.getElementById('review-rating').value = rating;
                            document.querySelectorAll('.rating-btn').forEach(b => b.style.opacity = '0.5');
                            [...document.querySelectorAll('.rating-btn')].slice(0, rating).forEach(b => b.style.opacity = '1');
                        });
                    });

                    // Set initial rating
                    document.querySelectorAll('.rating-btn').forEach((b, i) => {
                        if (i < 5) b.style.opacity = '1';
                    });
                } else {
                    reviewForm.style.display = 'none';
                    loginPrompt.style.display = 'block';
                }
            });

            async function submitReview(event) {
                event.preventDefault();
                const productId = new URLSearchParams(window.location.search).get('id');
                const rating = parseInt(document.getElementById('review-rating').value);
                const comment = event.target.comment.value;

                try {
                    const response = await Reviews.create(productId, rating, comment);
                    if (response.success) {
                        showNotification('Review submitted successfully!', 'success');
                        event.target.reset();
                        setTimeout(() => location.reload(), 1500);
                    }
                } catch (error) {
                    showNotification('Failed to submit review', 'error');
                }
            }
        </script>
    </div>

    <!-- Related Products -->
    <section style="background: var(--light-color); padding: 3rem 2rem; margin-top: 3rem;">
        <div style="max-width: 1400px; margin: 0 auto;">
            <h2 style="margin-bottom: 2rem;">You Might Also Like</h2>
            <div id="related-products" class="products-grid"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer style="background: #333; color: white; padding: 3rem 2rem; text-align: center;">
        <p>&copy; 2024 CampusKudi. All rights reserved.</p>
    </footer>

    <!-- Scripts -->
    <script src="./js/api.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/products.js"></script>
</body>
</html>
